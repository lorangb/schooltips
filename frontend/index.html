<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolTips</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container fade-in">
    <div class="logo">School<span>Tips</span></div>
    <p class="subtitle">Browse the web freely on school devices.</p>
    
    <div class="url-box">
      <form action="/browse" method="get" target="_blank">
        <input type="text" name="url" placeholder="https://example.com" class="url-input" id="urlInput">
        <button type="submit" class="go-btn">Go</button>
      </form>
    </div>

    <div class="info">
      <p>Type a URL above and browse through the proxy. The school only sees SchoolTips — everything else is hidden.</p>
    </div>
  </div>
</body>
</html>
